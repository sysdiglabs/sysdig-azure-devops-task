trigger: none
pr:
  autoCancel: "true"
  branches:
    include: ['*']

variables:
  imageName: 'gcr.io/distroless/static:nonroot'
  system.debug: 'true'

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  clean: "true"

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Use Node 20.x'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'npm ci --include=dev'
    workingDirectory: 'sysdig-cli-scan-task'
  displayName: 'Install deps'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      set -e
      npm run build
    workingDirectory: 'sysdig-cli-scan-task'
  displayName: 'Build task'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'docker pull $(imageName) || true'
  displayName: 'Pre-pull test image'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      set -euo pipefail
      echo "Running smoke test..."

      # Set agent-like environment
      export SYSTEM_DEFAULTWORKINGDIRECTORY="$PWD"
      export BUILD_SOURCESDIRECTORY="$PWD"
      export AGENT_TEMPDIRECTORY="$(mktemp -d)"
      export AGENT_TOOLSDIRECTORY="$(mktemp -d)"
      export AGENT_VERSION="3.999.0"
      export SYSTEM_COLLECTIONURI="https://dev.azure.com/dummy/"
      export SYSTEM_TEAMPROJECT="dummy"
      export BUILD_BUILDID="$(Build.BuildId)"
      export SYSTEM_DEBUG="$(system.debug)"

      # Map task inputs
      export INPUT_SYSDIGURL='https://app.us2.sysdig.com'
      export INPUT_APIKEY='$(SYSDIG_API_TOKEN)'
      export INPUT_IMAGE='$(imageName)'
      export INPUT_VERBOSE='true'
      export INPUT_FAILBUILD='false'

      # Run the task directly
      node sysdig-cli-scan-task/dist/index.js
  displayName: 'Local smoke-run of the task'